spring:
  application:
    name: different-state-machine
  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/spring_state_machine?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:springuser}
    password: ${SPRING_DATASOURCE_PASSWORD:springpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # JPA / Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Logging levels for debugging the Integration Flow
logging:
  level:
    org.springframework.integration: INFO
    springboot.samples.different: DEBUG

# Springdoc configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: true
