version: '3'

#
#We must ensure that the service names and KAFKA_BROKER_ID are unique across the services.
#
# Moreover, each service must expose a unique port to the host machine.
# Although zookeeper-1 and zookeeper-2 are listening on port 2181, they're exposing it to the host via ports 22181 and 32181,respectively.
# The same logic applies for the kafka-1 and kafka-2 services, where they'll be listening on ports 29092 and 39092, respectively.
services:
  zookeeper-1:
    container_name: zookeeper-1_ct
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"

  zookeeper-2:
    container_name: zookeper-2_ct
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "32181:2181"

  kafka-1:
    container_name: kafka-1_ct
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper-1
      - zookeeper-2
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-2:
    container_name: kafka-2_ct
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper-1
      - zookeeper-2
    ports:
      - "39092:39092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

#
# MongoDB configuration
#
  mongo:
    container_name: mongo_ct
    image: mongo:latest
    environment:
      - MONGO_INITDB_DATABASE=kafka-02
      - MONGO_INITDB_USERNAME=kafka-02-username
      - MONGO_INITDB_PASSWORD=kafka-02-password
      - MONGO-INITDB_ROOT_USERNAME=johndoe
      - MONGO-INITDB_ROOT_PASSWORD=johndoe@P4ssw()rd
    ports:
      - "27017": "27017"
    volumes:
      - mongodb-data:/data/mongodb-data
      - mongodb-config:/data/mongodb-config
    networks:
      - mongodb_net

networks:
  mongodb_net:
    driver: bridge

volumes:
  mongodb-data:
  mongodb-config: